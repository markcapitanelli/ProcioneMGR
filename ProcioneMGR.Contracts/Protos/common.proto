// Tipi condivisi tra i contratti dei microservizi ProcioneMGR.
syntax = "proto3";

package procionemgr.common.v1;

option csharp_namespace = "ProcioneMGR.Contracts.Common.V1";

// Valore decimale esatto per importi e quantita'. MAI double per il denaro: la perdita di
// precisione IEEE-754 a valle (SafetyChecker, position sizing) sarebbe un bug di sicurezza.
// Convenzione google.type.Decimal-like: value = units + nanos / 1e9, con nanos dello stesso
// segno di units (es. -1.75 => units=-1, nanos=-750_000_000).
message DecimalValue {
  int64 units = 1;
  sfixed32 nanos = 2;
}

// Coppia simbolo/timeframe usata ovunque nella piattaforma (es. BTCUSDT / 1h).
message Instrument {
  string symbol = 1;
  string timeframe = 2;
}
