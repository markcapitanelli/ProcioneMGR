name: CI

# Build + test + audit vulnerabilita'. Nessun secret richiesto.
# La build/push delle immagini Docker vive nel workflow separato docker-build.yml (Fase 0 microservizi).
on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ProcioneMGR.sln

      - name: Build
        run: dotnet build ProcioneMGR.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test ProcioneMGR.Tests/ProcioneMGR.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: Audit vulnerable packages (fail on high)
        shell: bash
        run: |
          echo "Scanning for vulnerable NuGet packages..."
          report="$(dotnet list ProcioneMGR.sln package --vulnerable --include-transitive 2>&1)"
          echo "$report"
          if echo "$report" | grep -Ei '\bHigh\b|\bCritical\b'; then
            echo "::error::High/Critical severity vulnerable package(s) detected."
            exit 1
          fi
          echo "No high/critical vulnerabilities found."
