# Deployment del microservizio di inferenza ML (Fase 2a, dual-read).
# A differenza di ingestion/trading, questo servizio è SOLA LETTURA nel path di inferenza (legge i
# SavedMlModels, nessuna scrittura DB): NON ha il vincolo "mai due scrittori", quindi NESSUN
# replicas:1 obbligatorio e RollingUpdate va bene. In Fase 2a si parte comunque con replicas: 1
# come scelta prudente di primo lancio (non per vincolo tecnico): scalarlo in futuro è sicuro.
# Prerequisito: Secret postgres-conn nel namespace (scripts/k8s-postgres-secret.ps1).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: procionemgr-ml
  namespace: procionemgr-ml
  labels:
    app.kubernetes.io/part-of: procionemgr
    app.kubernetes.io/component: ml
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: ml
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: procionemgr
        app.kubernetes.io/component: ml
    spec:
      containers:
        - name: ml
          image: ghcr.io/markcapitanelli/procionemgr-ml:latest
          # Due porte: il gRPC gira in h2c (solo HTTP/2) su 8080, mentre le probe httpGet qui sotto
          # parlano HTTP/1.1 e devono quindi puntare a un endpoint separato (8081), altrimenti
          # fallirebbero contro l'endpoint solo-HTTP/2 e manderebbero il pod in CrashLoop.
          ports:
            - name: grpc
              containerPort: 8080
            - name: health
              containerPort: 8081
          envFrom:
            - secretRef:
                name: postgres-conn   # fornisce ConnectionStrings__PostgresConnection
          readinessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
