# Configurazione minima Tempo (single-binary, storage locale su disco container —
# solo sviluppo locale, nessuna persistenza tra riavvii dello stack). Riceve OTLP
# dal collector (non direttamente dall'app: vedi otel-collector-config.yaml,
# pipeline "traces").
server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

storage:
  trace:
    backend: local
    local:
      path: /tmp/tempo/traces
    wal:
      path: /tmp/tempo/wal
